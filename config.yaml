alpha_vantage_key: null
backtest_engine: vectorbt
data_sources:
  - tickflow
  - yahooquery
fees_rate: 0.00088
invest_fraction: 0.95   # 买入仓位比例，0.95 保留5%现金缓冲（两个回测引擎共用）
slippage: 0.001          # 滑点（两个回测引擎统一）
feishu_webhook: null     # 飞书 Webhook 地址请配置在 keys.yaml 中，避免密钥泄露
lookback_months: 3
max_test_days: 20
max_tries: 300
min_return: 0.10
min_sharpe_ratio: 1.0
max_drawdown: -0.15
min_total_trades: 2
optuna_trials: 100
period: 5y
position_avg_cost: 500.0
position_shares: 200
position_peak_price: 0.0        # 持仓期间最高价（ATR 移动止损用），0 表示用入场价代替

# ── 风险管理配置 ────────────────────────────────────────────────
risk_management:
  use_atr_stop: true             # 是否启用 ATR 动态止损
  atr_period: 14                 # ATR 计算周期
  atr_multiplier: 2.0            # 止损价 = 峰值 - multiplier × ATR
  trailing_stop: true            # true = 移动止损（跟踪峰值），false = 固定入场价止损
  simulate_in_backtest: true     # 回测是否模拟 ATR 止损（true=开启，false=关闭保持向后兼容）
  cooldown_bars: 0               # 止损触发后冷却 bar 数（0=无冷却，>0 模拟熔断暂停）
  use_kelly: false               # 是否启用 Kelly 仓位公式（需要回测胜率/盈亏比数据）
  kelly_fraction: 0.5            # Kelly 缩放系数（0.5 = 半 Kelly）
  max_position_pct: 0.25         # 单股最大仓位比例（25%）
  portfolio_value: 200000.0      # 总资金（Kelly 仓位换算基准）
  daily_loss_limit: 0.05         # 单日亏损超过此比例触发熔断（5%）
  max_consecutive_loss_days: 3   # 连续亏损天数超过此值触发熔断
stamp_duty: 0.001
test_days: 5
test_months: 6              # Hold-Out 封存段长度（月）：最近 N 个月完全封存，不参与超参搜索
early_stop_threshold: 0.03  # 早停软阈值：val 累计收益低于此值直接跳过（trial >= 10 后生效）
use_cv: false               # 修复项3b：是否启用 TimeSeriesSplit 时序 CV（tsfresh 变种建议保持 false）
wf_min_window_win_rate: 0.5 # Walk-Forward 准入：窗口胜率最低要求
ticker: 0700.hk
train_years: 5
use_optuna: true

# 情感分析配置
# sentiment_weight=0.0 表示情感仅作为参考信息展示，不影响交易决策
# 设置 0.0~0.3 可让情感信号对策略信号进行轻微加权
sentiment_weight: 0.03          # 情感信号权重（0=仅展示，>0=参与加权，建议不超过0.3）

# ── 实盘接口配置（OMS）──────────────────────────────────────────
# 填写后系统会在买入/卖出信号触发时通过 OMS 提交订单
# 真实密钥请配置在 keys.yaml 中，避免泄露
broker_api_url: null     # 券商 API 地址（如富途/Tiger/IBKR），null 表示使用纸面交易
# broker_api_key 和 broker_account 请在 keys.yaml 中配置

# 策略训练配置 (统一配置，替代旧的 strategies 列表)
# 分类: single (单股票), multi (多股票), custom (自定义)
# - single: 使用当前股票数据训练和验证
# - multi: 使用多股票数据训练，但验证和回测使用目标股票数据
# - custom: 使用策略自定义的训练逻辑
strategy_training:
  # 规则策略 - 单股票训练
  single:
    - bollinger_rsi_trend
    - macd_rsi_trend
    - rsi_divergence
    - stochastic_oscillator
    - vwap_momentum
    - atr_breakout
    - volume_price_trend
    - ma_crossover
    - rsi_reversion
    - kdj_obv
    - kdj_pvt
    - rsi_obv
    - rsi_pvt
    - bollinger_breakout
    - macd_rsi_combo
    - rsi_drawdown_0225       # 含止损逻辑的 RSI 回撤策略

  # ML 策略 - 多股票训练
  multi:
    - xgboost_enhanced
    - xgboost_enhanced_tsfresh  # xgboost + tsfresh
    - xgboost_enhanced_ta_tsfresh  # xgboost + ta-lib + tsfresh
    - lightgbm_enhanced
    - lightgbm_enhanced_tsfresh  # lightgbm + tsfresh
    - lightgbm_enhanced_ta_tsfresh  # lightgbm + ta-lib + tsfresh

  # 自定义训练策略
  custom: []

# ML 策略配置
ml_strategies:
  # xgboost_enhanced 配置
  xgboost_enhanced:
    use_tsfresh_features: false  # 是否添加 tsfresh 特征
    use_ta_lib: true  # 是否使用 ta-lib 计算技术指标 (需要 pip install ta)
    tsfresh_window_sizes: [10, 20]  # tsfresh 滚动窗口
    xgb_n_estimators: 100
    xgb_max_depth: 5
    xgb_learning_rate: 0.1
    # 修复项4：正则化默认值
    xgb_subsample: 0.8
    xgb_colsample_bytree: 0.8
    xgb_reg_alpha: 0.0
    xgb_reg_lambda: 1.0          # XGBoost 官方默认值，勿设为 0.0
    xgb_min_child_weight: 1

  # xgboost_enhanced_tsfresh 配置 (启用 tsfresh，禁用 ta-lib)
  xgboost_enhanced_tsfresh:
    use_tsfresh_features: true
    use_ta_lib: false
    tsfresh_window_sizes: [10, 20]
    xgb_n_estimators: 100
    xgb_max_depth: 5
    xgb_learning_rate: 0.1
    # 修复项4：正则化默认值
    xgb_subsample: 0.8
    xgb_colsample_bytree: 0.8
    xgb_reg_alpha: 0.0
    xgb_reg_lambda: 1.0
    xgb_min_child_weight: 1

  # xgboost_enhanced_ta_tsfresh 配置 (启用 ta-lib + tsfresh)
  xgboost_enhanced_ta_tsfresh:
    use_tsfresh_features: true
    use_ta_lib: true
    tsfresh_window_sizes: [10, 20]
    xgb_n_estimators: 100
    xgb_max_depth: 5
    xgb_learning_rate: 0.1
    # 修复项4：正则化默认值
    xgb_subsample: 0.8
    xgb_colsample_bytree: 0.8
    xgb_reg_alpha: 0.0
    xgb_reg_lambda: 1.0
    xgb_min_child_weight: 1

  # lightgbm_enhanced 配置
  lightgbm_enhanced:
    use_ta_lib: false  # 是否使用 ta-lib 计算技术指标
    use_tsfresh_features: false  # 是否添加 tsfresh 特征
    lgbm_n_estimators: 100
    lgbm_max_depth: 5
    lgbm_learning_rate: 0.1
    lgbm_num_leaves: 31
    # 修复项4：LightGBM 正则化默认值（使用原生参数名）
    lgb_feature_fraction: 0.8
    lgb_bagging_fraction: 0.8
    lgb_reg_alpha: 0.0
    lgb_reg_lambda: 0.0
    lgb_min_child_samples: 20

  # lightgbm_enhanced_tsfresh 配置 (启用 tsfresh，禁用 ta-lib)
  lightgbm_enhanced_tsfresh:
    use_tsfresh_features: true
    use_ta_lib: false
    tsfresh_window_sizes: [10, 20]
    lgbm_n_estimators: 100
    lgbm_max_depth: 5
    lgbm_learning_rate: 0.1
    lgbm_num_leaves: 31
    # 修复项4：LightGBM 正则化默认值（使用原生参数名）
    lgb_feature_fraction: 0.8
    lgb_bagging_fraction: 0.8
    lgb_reg_alpha: 0.0
    lgb_reg_lambda: 0.0
    lgb_min_child_samples: 20

  # lightgbm_enhanced_ta_tsfresh 配置 (启用 ta-lib + tsfresh)
  lightgbm_enhanced_ta_tsfresh:
    use_tsfresh_features: true
    use_ta_lib: true
    tsfresh_window_sizes: [10, 20]
    lgbm_n_estimators: 100
    lgbm_max_depth: 5
    lgbm_learning_rate: 0.1
    lgbm_num_leaves: 31
    # 修复项4：LightGBM 正则化默认值（使用原生参数名）
    lgb_feature_fraction: 0.8
    lgb_bagging_fraction: 0.8
    lgb_reg_alpha: 0.0
    lgb_reg_lambda: 0.0
    lgb_min_child_samples: 20

# ── 每日推荐引擎配置（daily_run.py 专用） ──────────────────────────
daily_run:
  # 因子过期阈值（天）：超过此天数建议重新训练
  # 建议: 每周一次完整训练（7天），每日只做轻量推断
  min_factor_age_days: 7

  # 因子过期时是否提示重训（true=提示，daily_run 本身不自动训练）
  retrain_on_stale: true

  # 并发分析线程数（同时处理多只股票）
  # 建议: 4~8（受数据 I/O 瓶颈，过高无益）
  max_workers: 4

  # 默认历史数据周期
  data_period: 3y

  # 是否默认开启情感分析（耗时，每只股票约 3~10s）
  enable_sentiment: true

  # 参与共识投票的最大因子数量
  # 取编号最新的 N 个因子，确保使用最近训练的策略
  max_consensus_factors: 20

